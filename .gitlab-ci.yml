stages:
- checks
- test
- deploy

before_script:
- apt-get update
- apt-get install redis-server -y
- redis-server --daemonize yes
- python -V
- pip install tox

pre-commit-check:
  stage: checks
  image: python:3.8-bullseye
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  script:
    - pip install pre-commit
    - pre-commit run --all-files

check-docs:
  stage: checks
  image: python:3.8-bullseye
  script:
  - tox -e docs

.test-py37:
  stage: test
  needs: []
  image: python:3.7-bullseye

.test-py38:
  stage: test
  needs: []
  image: python:3.8-bullseye

.test-py39:
  stage: test
  needs: []
  image: python:3.9-bullseye

.test-py310:
  stage: test
  needs: []
  image: python:3.10-bullseye

test-py37-pycord17
  extends: .test-py37
  script:
  - tox -e py37-pycord17
  - bash <(curl -s https://codecov.io/bash)

test-py38-pycord17
  extends: .test-py38
  script:
  - tox -e py38-pycord17
  - bash <(curl -s https://codecov.io/bash)

test-py38-pycord20
  extends: .test-py38
  script:
  - tox -e py38-pycord20
  - bash <(curl -s https://codecov.io/bash)

test-py39-pycord17
  extends: .test-py39
  script:
  - tox -e py39-pycord17
  - bash <(curl -s https://codecov.io/bash)

test-py39-pycord20
  extends: .test-py39
  script:
  - tox -e py39-pycord20
  - bash <(curl -s https://codecov.io/bash)

test-py310-pycord17
  extends: .test-py310
  script:
  - tox -e py310-pycord17
  - bash <(curl -s https://codecov.io/bash)

test-py310-pycord20
  extends: .test-py310
  script:
  - tox -e py310-pycord20
  - bash <(curl -s https://codecov.io/bash)

deploy-pypi:
  stage: deploy
  image: python:3.8-bullseye

  before_script:
    - pip install twine

  script:
    - python setup.py sdist
    - twine upload dist/*

  only:
    - tags
